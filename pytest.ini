[pytest]
DJANGO_SETTINGS_MODULE = inclusion_connect.settings.test
python_files = test*.py
filterwarnings =
    error
    # Until mozilla-django-oidc stops using josepy
    ignore:.*support in pyOpenSSL is deprecated. You should use the APIs in cryptography.:DeprecationWarning
    ignore:.*Use timezone-aware objects to represent datetimes in UTC.*:DeprecationWarning:django_datadog_logger
    # pysaml2's signature-verification path writes certs to NamedTemporaryFiles it never closes;
    # the leaked handle surfaces as an unraisable ResourceWarning during GC (harmless in prod).
    ignore:Exception ignored in.*\.pem:pytest.PytestUnraisableExceptionWarning
addopts =
    --reuse-db
    --strict-markers
markers =
    no_django_db: mark tests that should not be marked with django_db.
